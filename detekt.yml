# detekt.yml — project-specific overrides on top of detekt defaults
# This file is picked up by the detekt {} block in build.gradle.kts via config.setFrom(files("detekt.yml")).
# All other rules use detekt's built-in defaults (buildUponDefaultConfig = true).

complexity:
  LongMethod:
    threshold: 80              # PassiveAiScanner / McpTools have long methods by design
  LongParameterList:
    functionThreshold: 10      # AgentSettings and backend constructors have many fields
    constructorThreshold: 10   # Use new property names (threshold is deprecated in 1.23.8)

naming:
  FunctionNaming:
    excludes: [ '**/test/**' ]
