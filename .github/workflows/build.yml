name: Build & PR Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: ktlint check (non-blocking until baseline is clean)
        run: ./gradlew ktlintCheck --no-daemon
        continue-on-error: true

  pr-gate:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run fast verification suite
        run: ./gradlew test -PexcludeHeavyTests=true --no-daemon

      - name: Build shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Upload JAR artifact (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Custom-AI-Agent-${{ github.sha }}
          path: build/libs/Custom-AI-Agent-*.jar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}-${{ github.sha }}
          path: |
            build/reports/tests/test/**
            build/test-results/test/**

      - name: Upload coverage report (Linux only)
        if: matrix.os == 'ubuntu-latest' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: build/reports/jacoco/test/**
