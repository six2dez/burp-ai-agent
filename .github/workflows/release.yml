name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint check
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run full test suite (fast + heavy)
        run: ./gradlew test nightlyRegressionTest --no-daemon

      - name: Build shadow JAR
        run: ./gradlew shadowJar --no-daemon

      - name: Generate SBOM (CycloneDX)
        # --no-configuration-cache: cyclonedx-gradle-plugin 1.10.0 uses Task.project
        # at execution time, which is incompatible with Gradle's configuration cache.
        run: ./gradlew cyclonedxBom --no-daemon --no-configuration-cache

      - name: Compute SHA-256 checksum
        run: |
          cd build/libs
          for f in Custom-AI-Agent-*.jar; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Extract release notes from CHANGELOG
        id: extract_notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract the section between "## [VERSION]" and the next "## [" heading
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog section for $VERSION, falling back to auto-generated notes." > release_notes.md
          fi
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.extract_notes.outputs.notes_file }}
          generate_release_notes: true
          append_body: true
          files: |
            build/libs/Custom-AI-Agent-*.jar
            build/libs/Custom-AI-Agent-*.jar.sha256
            build/reports/sbom/bom.json
